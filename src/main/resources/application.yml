spring:
  application:
    name: franchise-api
  data:
    mongodb:
      uri: ${MONGO_URI:mongodb://localhost:27017/franchisedb}

server:
  port: ${SERVER_PORT:8080}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: alpha
    tagsSorter: alpha
  show-actuator: true

